version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stp_user
      POSTGRES_PASSWORD: stp_pass
      POSTGRES_DB: stp_db
    ports:
      - "5432:5432"
    volumes:
      - stp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stp_user -d stp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://stp_user:stp_pass@db:5432/stp_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  stp_pgdata:
